name: Check documentation links

on:
  push:
    paths:
      - "**/*.md"
      - "resources/catalog.yml"

  pull_request:
    paths:
      - "**/*.md"
      - "resources/catalog.yml"

  schedule:
    - cron: "0 3 * * 1"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    name: Check links
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check documentation links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --max-retries 3
            --accept 200,206,429
            "./**/*.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
