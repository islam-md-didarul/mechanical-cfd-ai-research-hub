name: Documentation Validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-documentation:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install documentation dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Check required repository files
        shell: bash
        run: |
          set -euo pipefail
          required_files=(
            "README.md"
            "CONTRIBUTING.md"
            "LICENSE"
            "NOTICE.md"
            "learning-paths/README.md"
            "learning-paths/foundations.md"
            "learning-paths/cfd.md"
            "learning-paths/scientific-ai.md"
            "project-guides/README.md"
            "project-guides/verification-validation.md"
            "project-guides/surrogate-optimization.md"
            "resources/README.md"
            "resources/selection-guide.md"
            "resources/catalog.md"
            "resources/catalog.yml"
            "scripts/validate_catalog.py"
            "assets/images/research-hub-banner-light.svg"
            "assets/images/research-hub-banner-dark.svg"
            "assets/icons/foundations.svg"
            "assets/icons/cfd.svg"
            "assets/icons/scientific-ai.svg"
            "assets/icons/medical-cfd.svg"
            "assets/icons/turbomachinery.svg"
            "assets/icons/piv-rom.svg"
            "assets/icons/multiphase.svg"
          )
          for file in "${required_files[@]}"; do
            if [[ ! -s "$file" ]]; then
              echo "::error file=$file::Required file is missing or empty."
              exit 1
            fi
          done

      - name: Validate resource catalog
        run: python scripts/validate_catalog.py

      - name: Validate internal Markdown links
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from urllib.parse import unquote
          import re
          import sys

          root = Path.cwd()
          missing = []
          markdown_links = re.compile(r'!?\[[^\]]*\]\(([^)]+)\)')
          html_links = re.compile(r'(?:href|src|srcset)=["\']([^"\']+)["\']', re.IGNORECASE)

          for md_file in root.rglob("*.md"):
              text = md_file.read_text(encoding="utf-8")
              targets = markdown_links.findall(text) + html_links.findall(text)
              for raw_target in targets:
                  target = raw_target.strip().split()[0]
                  if not target or target.startswith(("http://", "https://", "mailto:", "#", "data:")):
                      continue
                  clean = unquote(target.split("#", 1)[0].split("?", 1)[0])
                  if not clean:
                      continue
                  resolved = (md_file.parent / clean).resolve()
                  if not resolved.exists():
                      missing.append((md_file, target))

          if missing:
              for source, target in missing:
                  print(f"::error file={source}::{target} — target does not exist")
              sys.exit(1)

          print("All internal Markdown and HTML links are valid.")
          PY

      - name: Validate SVG assets
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET
          import sys

          errors = []
          for svg in Path("assets").rglob("*.svg"):
              try:
                  ET.parse(svg)
              except ET.ParseError as exc:
                  errors.append((svg, exc))

          if errors:
              for svg, exc in errors:
                  print(f"::error file={svg}::Invalid SVG XML: {exc}")
              sys.exit(1)

          print("All SVG assets are valid XML.")
          PY
